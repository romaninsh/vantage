[package]
name = "vantage-types-entity"
version = "0.4.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Entity proc macro for the Vantage type system"
repository = "https://github.com/romaninsh/vantage"

[features]
serde = []

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1.0"
quote = "1.0"
syn = { version = "2.0", features = ["full", "extra-traits"] }
