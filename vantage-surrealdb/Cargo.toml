[package]
edition = "2024"
name = "vantage-surrealdb"
version = "0.6.0"
license = "MIT OR Apache-2.0"
authors = ["Romans Malinovskis <me@nearly.guru>"]
description = "Vantage extension for SurrealDB"
homepage = "https://romaninsh.github.io/vantage"
repository = "https://github.com/romaninsh/vantage"
autoexamples = false

[features]
default = ["decimal"]
decimal = ["surreal-client/decimal", "rust_decimal"]
vista = ["dep:vantage-vista"]
# `rhai` powers both the standalone query DSL and (with `vista`) scripted
# reference traversal, so it pulls in the vista layer and its conventional
# engine. Keeping them coupled means `register_rhai_extensions` always has the
# `vantage-vista` rhai vocabulary to layer onto.
rhai = ["dep:rhai", "vista", "vantage-vista/rhai"]

[dependencies]
async-trait = "0.1"
vantage-core = { version = "0.6", path = "../vantage-core" }
vantage-expressions = { version = "0.6", path = "../vantage-expressions", features = ["chrono"] }
vantage-table = { version = "0.6", path = "../vantage-table" }
vantage-dataset = { version = "0.6", path = "../vantage-dataset" }
vantage-types = { version = "0.6", path = "../vantage-types", features = ["serde"] }
vantage-vista = { version = "0.6", path = "../vantage-vista", optional = true }
surreal-client = { version = "0.6", path = "../surreal-client" }

ciborium = "0.2"
hex = "0.4"
indexmap = { version = "2.14.0", features = ["serde"] }
paste = "1.0"
serde_json = { version = "1", features = ["preserve_order", "raw_value"] }
serde = { version = "1.0", features = ["derive"] }
thiserror = "2.0"
tokio = { version = "1.52", features = ["full"] }
base64 = "0.22"
md5 = "0.8"
serde_path_to_error = "0.1"
rust_decimal = { version = "1.42", optional = true }
uuid = { version = "1.23", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
rhai = { version = "1.25", optional = true }

# Disable all tests except queries.rs during 0.3 migration
[[test]]
name = "search_expression"
path = "tests/search_expression.rs"

[[test]]
name = "select"
path = "tests/select.rs"

[[test]]
name = "table_ext"
path = "tests/table_ext.rs"
test = false

[[test]]
name = "table_ext_mocked"
path = "tests/table_ext_mocked.rs"
test = false

[[test]]
name = "test_expressions"
path = "tests/test_expressions.rs"
test = false

[[test]]
name = "test_insert_cbor"
path = "tests/test_insert_cbor.rs"
test = false

[[test]]
name = "test_insert_unstructured"
path = "tests/test_insert_unstructured.rs"
test = false

# Disable queries.rs test until modules are uncommented
[[test]]
name = "queries"
path = "tests/queries.rs"
test = false

# Examples disabled during 0.3 migration (files moved to .disabled)

[dev-dependencies]
bakery_model3 = { path = "../bakery_model3" }
serde_yaml_ng = "0.10"
vantage-vista = { version = "0.6", path = "../vantage-vista" }

[[example]]
name = "expr"
path = "examples/expr.rs"

[[example]]
name = "rhai_test"
path = "examples/rhai_test.rs"
required-features = ["rhai"]
