[package]
name = "example_tauri"
version = "0.4.0"
description = "Dataset UI Adapters — Tauri Table Example"
authors = ["you"]
license = ""
repository = ""
edition = "2021"

[workspace]

[build-dependencies]
tauri-build = { version = "2.5", features = [] }

[dependencies]
tauri = { version = "2.10", features = [] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dataset-ui-adapters = { path = "../../vantage-ui-adapters", features = [
    "tauri",
] }
bakery_model3 = { path = "../../bakery_model3" }
vantage-table = { path = "../../vantage-table" }
tokio = { version = "1.52", features = ["macros", "rt-multi-thread"] }
anyhow = "1.0"

[features]
default = []
