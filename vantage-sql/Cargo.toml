[package]
name = "vantage-sql"
version = "0.4.0"
edition = "2024"
license = "MIT OR Apache-2.0"
authors = ["Romans Malinovskis <me@nearly.guru>"]
description = "Vantage extension for SQL databases (Postgres, MySQL, SQLite)"
documentation = "https://docs.rs/vantage"
homepage = "https://romaninsh.github.io/vantage"
repository = "https://github.com/romaninsh/vantage"
readme = "../README.md"
autoexamples = false

[features]
default = ["sqlite"]
sqlite = ["sqlx/sqlite"]

[dependencies]
vantage-core = { path = "../vantage-core" }
vantage-types = { path = "../vantage-types", features = ["serde"] }
vantage-expressions = { path = "../vantage-expressions" }
paste = "1.0"

sqlx = { version = "0.8", features = ["runtime-tokio"] }
serde_json = { version = "1", features = ["preserve_order"] }
serde = { version = "1.0", features = ["derive"] }
indexmap = { version = "2.12.0", features = ["serde"] }
tokio = { version = "1", features = ["full"] }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
