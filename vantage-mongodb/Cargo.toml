[package]
name = "vantage-mongodb"
version = "0.4.5"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "MongoDB persistence backend for Vantage framework"
repository = "https://github.com/romaninsh/vantage"

[features]
default = []
vista = ["dep:vantage-vista"]

[dependencies]
vantage-core = { version = "0.4", path = "../vantage-core" }
vantage-types = { version = "0.4", path = "../vantage-types" }
vantage-expressions = { version = "0.4", path = "../vantage-expressions" }
vantage-table = { version = "0.4.4", path = "../vantage-table" }
vantage-dataset = { version = "0.4.2", path = "../vantage-dataset" }
vantage-vista = { version = "0.4.2", path = "../vantage-vista", optional = true }

bson = "2"
ciborium = { version = "0.2", features = ["std"] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
indexmap = { version = "2", features = ["serde"] }
paste = "1"
async-trait = "0.1"
mongodb = "3"
tokio = { version = "1", features = ["full"] }
futures-util = "0.3"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
pretty_assertions = "1"
serde_yaml_ng = "0.10"
vantage-vista = { version = "0.4.2", path = "../vantage-vista" }
