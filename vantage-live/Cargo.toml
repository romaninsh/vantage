[package]
name = "vantage-live"
version = "0.4.0"
edition = "2024"
license = "MIT OR Apache-2.0"
authors = ["Romans Malinovskis <me@nearly.guru>"]
description = "Locally-cached, write-through table wrapper for the Vantage framework"
documentation = "https://docs.rs/vantage-live"
homepage = "https://romaninsh.github.io/vantage"
repository = "https://github.com/romaninsh/vantage"
readme = "../README.md"

[dependencies]
vantage-core = { version = "0.4", path = "../vantage-core" }
vantage-types = { version = "0.4", path = "../vantage-types" }
vantage-expressions = { version = "0.4", path = "../vantage-expressions" }
vantage-dataset = { version = "0.4.2", path = "../vantage-dataset" }
vantage-table = { version = "0.4.6", path = "../vantage-table" }
vantage-redb = { version = "0.4", path = "../vantage-redb" }

async-trait = "0.1"
ciborium = { version = "0.2", features = ["std"] }
indexmap = "2"
futures-util = "0.3"
tokio = { version = "1", features = ["sync", "rt", "macros", "time"] }
tokio-stream = { version = "0.1", features = ["sync"] }
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tempfile = "3"
pretty_assertions = "1"
clap = { version = "4", features = ["derive"] }

[[example]]
name = "live_demo"
path = "examples/live_demo.rs"
