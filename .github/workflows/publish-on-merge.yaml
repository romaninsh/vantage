name: Publish on merge

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dtolnay/rust-toolchain@stable

      - name: Detect crates whose version changed
        id: detect
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail
          # Skip the empty-before case (initial push, branch create, force-push to a new sha that has no parent on main).
          if [ "${BEFORE}" = "0000000000000000000000000000000000000000" ] || [ -z "${BEFORE}" ]; then
            echo "No before-sha — skipping."
            echo "crates=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t toml_changes < <(git diff --name-only "${BEFORE}" "${AFTER}" -- '**/Cargo.toml' | sort -u)

          crates=()
          for f in "${toml_changes[@]}"; do
            dir=$(dirname "$f")
            [ "$dir" = "." ] && continue
            grep -q '^\[package\]' "$f" || continue
            grep -qE '^publish\s*=\s*false' "$f" && continue
            new_ver=$(awk -F'"' '/^version = "/ {print $2; exit}' "$f")
            old_ver=$(git show "${BEFORE}:$f" 2>/dev/null \
                       | awk -F'"' '/^version = "/ {print $2; exit}' || true)
            if [ -n "${new_ver}" ] && [ "${new_ver}" != "${old_ver}" ]; then
              crates+=("$dir")
            fi
          done

          if [ ${#crates[@]} -eq 0 ]; then
            echo "No version bumps in this push."
            echo "crates=" >> "$GITHUB_OUTPUT"
          else
            printf 'Will publish: %s\n' "${crates[@]}"
            {
              echo "crates<<EOF"
              printf '%s\n' "${crates[@]}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: cargo login
        if: steps.detect.outputs.crates != ''
        run: cargo login "${{ secrets.CRATES_IO_API_TOKEN }}"

      - name: Publish each bumped crate
        if: steps.detect.outputs.crates != ''
        env:
          CRATES: ${{ steps.detect.outputs.crates }}
        run: |
          set -euo pipefail
          # Canonical topological publish order. `cargo publish` checks
          # each crate's [dependencies] against crates.io at packaging
          # time, so a downstream crate's bumped version must already be
          # on the registry before its dependent publishes. Alphabetical
          # iteration fails when api-client (depends on vista) runs
          # before vista. New publishable crates must be appended here
          # at the right layer; the unknown-crate tail is a safety net,
          # not a substitute.
          PUBLISH_ORDER=(
            vantage-core
            vantage-types
            vantage-dataset
            vantage-vista
            vantage-expressions
            vantage-table
            vantage-cli-util
            vantage-redb
            vantage-api-pool
            vantage-aws
            vantage-api-client
            vantage-csv
            vantage-mongodb
            vantage-sql
            vantage-surrealdb
            vantage-log-writer
            vantage-live
            vantage-config
          )

          # Project the bumped crates onto the canonical order. Anything
          # not in the canonical list is appended at the end and logged
          # — that's a signal to update PUBLISH_ORDER, not silently
          # depend on alphabetical luck.
          mapfile -t bumped < <(printf '%s\n' $CRATES | sort -u)
          ordered=()
          for canonical in "${PUBLISH_ORDER[@]}"; do
            for c in "${bumped[@]}"; do
              if [ "$c" = "$canonical" ]; then
                ordered+=("$c")
              fi
            done
          done
          for c in "${bumped[@]}"; do
            in_order=0
            for o in "${ordered[@]}"; do
              [ "$c" = "$o" ] && { in_order=1; break; }
            done
            if [ $in_order -eq 0 ]; then
              echo "::warning::Crate '$c' is not in PUBLISH_ORDER — appending at end. Update the workflow."
              ordered+=("$c")
            fi
          done

          printf 'Publish order: %s\n' "${ordered[*]}"
          for crate in "${ordered[@]}"; do
            echo "::group::Publishing $crate"
            (cd "$crate" && cargo publish --no-verify --allow-dirty)
            echo "::endgroup::"
          done
