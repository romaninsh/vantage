name: Book

on:
  push:
    branches:
      - main
    paths:
      - "docs4/**"

  pull_request:
    paths:
      - "docs4/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "0.5.2"

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: mdbook-preprocessors-${{ runner.os }}-v1

      - name: Install preprocessors
        run: |
          command -v mdbook-toc || cargo install mdbook-toc --locked
          command -v mdbook-mermaid || cargo install mdbook-mermaid --locked
          command -v mdbook-admonish || cargo install mdbook-admonish --git https://github.com/padamson/mdbook-admonish --branch feat/mdbook-0.5-compat --locked

      - name: Install assets
        working-directory: ./docs4
        run: |
          mdbook-admonish install
          mdbook-mermaid install

      - name: Build
        working-directory: ./docs4
        run: mdbook build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs4/book
