[package]
name = "test-api-server"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
indexmap = "2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
csv = "1.4"
urlencoding = "2.1"
uuid = { version = "1", features = ["v4"] }
warp = { version = "0.4", features = ["server"] }
