[package]
name = "vantage-table"
version = "0.6.1"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Table, Column, and operation traits for the Vantage data framework"
repository = "https://github.com/romaninsh/vantage"
autoexamples = false

[[example]]
name = "mockbuilder_demo"
path = "examples/mockbuilder_demo.rs"

[lib]
doctest = false


[dependencies]
vantage-core = { version = "0.6", path = "../vantage-core" }
vantage-types = { version = "0.6", path = "../vantage-types" }
vantage-expressions = { version = "0.6", path = "../vantage-expressions" }
vantage-vista = { version = "0.6", path = "../vantage-vista" }
vantage-dataset = { version = "0.6", path = "../vantage-dataset" }
async-stream = "0.3"
async-trait = "0.1"
futures-core = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ciborium = { version = "0.2", features = ["std"] }
indexmap = "2.14"
mockall = "0.12"
paste = "1.0"
tokio = { version = "1.52", features = ["macros", "rt-multi-thread", "sync"] }
rust_decimal = { version = "1.42.0", features = ["macros", "serde"] }

[dev-dependencies]
tokio = { version = "1.52", features = ["macros", "rt-multi-thread", "sync"] }
serde_json = "1.0"
vantage-expressions = { version = "0.6", path = "../vantage-expressions" }
# vantage-surrealdb = { path = "../vantage-surrealdb" }
surreal-client = { version = "0.6", path = "../surreal-client" }
async-trait = "0.1"
ciborium = { version = "0.2", features = ["std"] }
url = { version = "2.5", features = ["serde"] }

# Disable tests during 0.3 migration
[[test]]
name = "expr"
path = "tests/expr.rs"
test = false

[[test]]
name = "table_like"
path = "tests/table_like.rs"
