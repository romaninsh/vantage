[package]
name = "vantage-diorama"
version = "0.4.3"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Cached, composable, reactive surface for Vantage Vistas"
repository = "https://github.com/romaninsh/vantage"

[lib]
doctest = false

[dependencies]
vantage-core = { version = "0.4.1", path = "../vantage-core" }
vantage-types = { version = "0.4", path = "../vantage-types" }
vantage-vista = { version = "0.4", path = "../vantage-vista" }
vantage-table = { version = "0.4", path = "../vantage-table" }
vantage-dataset = { version = "0.4", path = "../vantage-dataset" }

async-trait = "0.1"
ciborium = { version = "0.2", features = ["std"] }
indexmap = "2"
redb = "2.6"
thiserror = "2"
tokio = { version = "1", features = ["sync", "rt", "time"] }
tracing = "0.1"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "test-util", "sync", "time"] }
vantage-csv = { path = "../vantage-csv", features = ["vista"] }
vantage-sql = { path = "../vantage-sql", features = ["sqlite", "vista"] }
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio", "sqlite"] }
cucumber = { version = "0.21", default-features = false, features = ["macros"] }
insta = { version = "1.41", features = ["yaml", "filters"] }
rstest = "0.23"
futures = "0.3"

[[test]]
name = "bdd"
harness = false
