name: s3.buckets
columns:
  Name:
    type: string
    flags: [id, title, searchable]
  CreationDate:
    type: string
references:
  objects:
    table: s3.objects
    kind: has_many
    foreign_key: Bucket
cmd:
  rhai: |
    let args = ["s3api", "list-buckets", "--output", "json"];
    let out = run(args);
    if out.exit_code != 0 { throw out.stderr; }
    parse_json(out.stdout).Buckets
