name: ecs.tasks
columns:
  taskArn:
    type: string
    flags: [id, title, searchable]
  cluster:
    type: string
    flags: [hidden]
cmd:
  rhai: |
    let args = ["ecs", "list-tasks", "--output", "json"];
    let cluster = "";
    for c in conditions {
        if c.field == "cluster" { args += ["--cluster", c.value]; cluster = c.value; }
    }
    let out = run(args);
    if out.exit_code != 0 { throw out.stderr; }
    let arns = parse_json(out.stdout).taskArns;
    let rows = [];
    for a in arns {
        rows.push(#{ "taskArn": a, "cluster": cluster });
    }
    rows
