<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GHCN Station Explorer</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; color: #222; }
      h1 { font-size: 1.4rem; }
      table { border-collapse: collapse; width: 100%; }
      th, td { text-align: left; padding: 0.25rem 0.75rem; border-bottom: 1px solid #eee; }
      td.num { text-align: right; font-variant-numeric: tabular-nums; }
      tbody tr:hover { background: #f4f7fb; cursor: pointer; }
      .toolbar { display: flex; gap: 0.75rem; align-items: center; margin: 0.75rem 0; }
      .detail { position: fixed; top: 2rem; right: 2rem; width: 26rem; background: #fff;
                border: 1px solid #ccd; border-radius: 6px; padding: 1rem;
                box-shadow: 0 8px 30px rgba(0,0,0,.15); }
      .detail h2 { font-size: 1rem; word-break: break-all; margin-top: 0; }
      .detail dl div { display: flex; gap: 0.5rem; }
      .detail dt { min-width: 10rem; color: #667; }
      .detail dd { margin: 0; word-break: break-all; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
