[package]
name = "dataset-ui-adapters"
version = "0.5.0"
edition = "2021"
publish = false

[dependencies]
# Core dependencies always included
tokio = { version = "1.47", features = ["macros", "rt-multi-thread", "sync"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
async-trait = "0.1"
vantage-table = { path = "../vantage-table" }
vantage-dataset = { path = "../vantage-dataset" }
vantage-types = { path = "../vantage-types", features = ["serde"] }
vantage-vista = { path = "../vantage-vista" }
vantage-diorama = { path = "../vantage-diorama", optional = true }
ciborium = "0.2"
indexmap = "2"

# Framework-specific dependencies (all optional)
egui = { version = "0.33", optional = true }
egui-data-table = { version = "0.10", optional = true }
egui_extras = { version = "0.33", optional = true }
gpui = { git = "https://github.com/zed-industries/zed.git", optional = true }
gpui-component = { git = "https://github.com/longbridge/gpui-component.git", optional = true }

slint = { version = "1.16", optional = true }
tauri = { version = "2.10", optional = true }
ratatui = { version = "0.30", optional = true }
crossterm = { version = "0.29", optional = true }
cursive = { version = "0.21", optional = true }
cursive_table_view = { version = "0.15", optional = true }

[dev-dependencies]
tokio-test = "0.4"

[features]
default = []
egui = ["dep:egui", "dep:egui-data-table", "dep:egui_extras"]
gpui = ["dep:gpui", "dep:gpui-component"]

slint = ["dep:slint"]
tauri = ["dep:tauri"]
ratatui = ["dep:ratatui", "dep:crossterm", "dep:vantage-diorama"]
cursive = ["dep:cursive", "dep:cursive_table_view"]
