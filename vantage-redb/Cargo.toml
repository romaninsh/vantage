[package]
name = "vantage-redb"
version = "0.4.0"
edition = "2024"
license = "MIT OR Apache-2.0"
authors = ["Romans Malinovskis <me@nearly.guru>"]
description = "Embedded redb key-value persistence backend for Vantage framework"
documentation = "https://docs.rs/vantage-redb"
homepage = "https://romaninsh.github.io/vantage"
repository = "https://github.com/romaninsh/vantage"
readme = "../README.md"

[dependencies]
vantage-core = { version = "0.4", path = "../vantage-core" }
vantage-types = { version = "0.4", path = "../vantage-types" }
vantage-expressions = { version = "0.4", path = "../vantage-expressions" }
vantage-table = { version = "0.4.4", path = "../vantage-table" }
vantage-dataset = { version = "0.4.2", path = "../vantage-dataset" }

redb = "2.6"
ciborium = { version = "0.2", features = ["std"] }
serde = { version = "1", features = ["derive"] }
indexmap = { version = "2", features = ["serde"] }
paste = "1"
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4"] }
futures-util = "0.3"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
pretty_assertions = "1"
tempfile = "3"
